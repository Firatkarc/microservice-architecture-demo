<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Create Order</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f9; }
    .form-container { max-width: 400px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .input-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background-color: #0056b3; }
    .alert { padding: 10px; margin-bottom: 15px; border-radius: 4px; }
    .error { background-color: #f8d7da; color: #721c24; }
    .success { background-color: #d4edda; color: #155724; }
  </style>
</head>
<body>

<div class="form-container">
  <h2>Place a New Order</h2>

  <!-- Status Messages -->
  <div th:if="${error}" class="alert error" th:text="${error}"></div>
  <div th:if="${success}" class="alert success" th:text="${success}"></div>

  <!-- The action must point to /order/postOrder -->
  <form action="/order/postOrder" method="POST">
    <div class="input-group">
      <label for="name">Customer Name:</label>
      <input type="text" id="name" name="name" required>
    </div>

    <div class="input-group">
      <label for="email">Customer Email:</label>
      <input type="email" id="email" name="email" required>
    </div>

    <div class="input-group">
      <label for="itemName">Item Name:</label>
      <input type="text" id="itemName" name="itemName" required>
    </div>

    <button type="submit">Submit Order</button>
  </form>
</div>

</body>
</html>
